<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My S3 Static Website</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

    <div class="container">
        <h1>Hello from AWS S3 🚀</h1>
        <p>This is my first static website hosted on Amazon S3.</p>

        <button onclick="showMessage()">
            Click Me
        </button>

        <p id="message"></p>
    </div>

    <script>
        function showMessage() {
            document.getElementById("message").innerText =
                "Your website is working successfully, Welcome on board!";
        }
    </script>

</body>
</html>
